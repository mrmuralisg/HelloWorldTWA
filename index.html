<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A minimal PWA ready for TWA">
  <meta name="theme-color" content="#4CAF50">
  <title>Hello World TWA</title>
  <link rel="manifest" href="/HelloWorldTWA/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/HelloWorldTWA/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/HelloWorldTWA/icon-512.png">
</head>
<body>
  <h1>Hello World!</h1>
  <p>This is a minimal PWA ready for TWA.</p>
  <button>Click Me</button>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/HelloWorldTWA/service-worker.js')
        .then(registration => {
          console.log('Service Worker registered successfully:', registration.scope);
        })
        .catch(error => {
          console.log('Service Worker registration failed:', error);
        });
    }
  </script>
</body>

</html>
