<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World TWA</title>
  
<link rel="manifest" href="./manifest.json" /><link rel="manifest" href="./manifest.json" /><link rel="manifest" href="./manifest" />  <meta name="theme-color" content="#4CAF50">
</head>
<body>
  <h1>Hello World!</h1>
  <p>This is a minimal PWA ready for TWA.</p>
  <button onclick="alert('Hello World!')">Click Me</button>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.error('Service Worker registration failed:', err));
    }

    // Optional: redirect to your Base44 app
    // window.location.href = "https://yourapp.base44.app";
    window.location.href = "https://mrmuralisg.github.io/HelloWorldTWA/";
  </script>
  
</body>
</html>
